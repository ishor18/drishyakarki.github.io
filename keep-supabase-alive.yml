name: Keep Supabase Alive

on:
  schedule:
    # Runs at 00:00 every Tuesday and Friday (twice a week is perfect)
    - cron: '0 0 * * 2,5'
  workflow_dispatch: # Allows you to trigger it manually from GitHub for testing

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run keep-alive script
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: node keep-alive.js
